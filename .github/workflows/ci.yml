name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Fetch BEAM dependencies
        run: nix develop --command mix deps.get

      - name: Check Elixir formatting
        run: nix develop --command mix format --check-formatted

      - name: Compile without warnings
        run: nix develop --command mix compile --warnings-as-errors

      - name: Run BEAM tests
        run: nix develop --command mix test --warnings-as-errors --cover

      - name: Audit Hex dependencies
        run: nix develop --command mix hex.audit

      - name: Evaluate and build flake checks
        run: nix flake check --print-build-logs
